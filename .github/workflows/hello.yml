name: Show system info

on:
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: 
        node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: 
        run: npm run build
