name: Build react app

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest


    steps:
      - name : Deploy to VPS 
        uses: appleboy/ssh-action@v1

        with:
          host: ${{secrets.VPS_HOST}}
          username: ${{secrets.VPS_NAME}}
          key: ${{secrets.VPS_SSH}}

          script : |
            cd ~/auramonster
            git pull
            source ~/.nvm/nvm.sh
            nvm use 24
            npm ci
            npm run build
            sudo cp -r ~/auramonster/dist/* /var/www/html
